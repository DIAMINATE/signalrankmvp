name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Verify ICP extractor URL
        run: |
          if [ -z "${{ vars.NEXT_PUBLIC_ICP_EXTRACTOR_URL }}" ]; then
            echo "::warning::NEXT_PUBLIC_ICP_EXTRACTOR_URL is not set. ICP extraction will fall back to mock data on the deployed site. Add it in Settings → Secrets and variables → Actions → Variables."
          else
            echo "NEXT_PUBLIC_ICP_EXTRACTOR_URL is configured."
          fi

      - run: npm run build
        env:
          NEXT_PUBLIC_ICP_EXTRACTOR_URL: ${{ vars.NEXT_PUBLIC_ICP_EXTRACTOR_URL }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - id: deployment
        uses: actions/deploy-pages@v4
